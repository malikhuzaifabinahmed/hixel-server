name: Deploy Hixel Server to Production

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via Raw SSH/SCP
        run: |
          # 1. Setup the SSH Private Key securely
          echo "${{ secrets.PROD_SSH_KEY }}" > deploy_key
          chmod 600 deploy_key

          # 2. Create the temporary directory on the server
          ssh -i deploy_key -o StrictHostKeyChecking=no opc@${{ secrets.PROD_HOST }} "mkdir -p /home/opc/tmp_deploy"

          # 3. Transfer the binary (Raw SCP - No Zipping)
          scp -i deploy_key -o StrictHostKeyChecking=no latest/hixelserver opc@${{ secrets.PROD_HOST }}:/home/opc/tmp_deploy/hixelserver

          # 4. Execute the deployment commands remotely via a piped script
          ssh -i deploy_key -o StrictHostKeyChecking=no opc@${{ secrets.PROD_HOST }} 'bash -e' << 'END_SSH_SCRIPT'
          
          # --- Remote Server Variables ---
          BINARY_NAME="hixelserver"
          SERVICE_NAME="hixelserver.service"
          BINARY_TMP_PATH="/home/opc/tmp_deploy/$BINARY_NAME"
          BINARY_FINAL_PATH="/home/opc/$BINARY_NAME"
          SERVICE_PATH="/etc/systemd/system/$SERVICE_NAME"

          echo "Setting executable permissions..."
          chmod +x $BINARY_TMP_PATH

          # Stop service if it is actively running
          if systemctl is-active --quiet $SERVICE_NAME; then
              echo "Stopping $SERVICE_NAME..."
              sudo systemctl stop $SERVICE_NAME
          fi

          echo "Moving binary to final location..."
          sudo mv $BINARY_TMP_PATH $BINARY_FINAL_PATH

          # Create service file cleanly to avoid indentation breaks
          if [ ! -f "$SERVICE_PATH" ]; then
              echo "Service not found. Creating $SERVICE_NAME..."
              echo "[Unit]" | sudo tee $SERVICE_PATH > /dev/null
              echo "Description=Hixel Server" | sudo tee -a $SERVICE_PATH > /dev/null
              echo "After=network.target" | sudo tee -a $SERVICE_PATH > /dev/null
              echo "" | sudo tee -a $SERVICE_PATH > /dev/null
              echo "[Service]" | sudo tee -a $SERVICE_PATH > /dev/null
              echo "ExecStart=$BINARY_FINAL_PATH --port 80" | sudo tee -a $SERVICE_PATH > /dev/null
              echo "WorkingDirectory=/home/opc" | sudo tee -a $SERVICE_PATH > /dev/null
              echo "Restart=always" | sudo tee -a $SERVICE_PATH > /dev/null
              echo "User=root" | sudo tee -a $SERVICE_PATH > /dev/null
              echo "" | sudo tee -a $SERVICE_PATH > /dev/null
              echo "[Install]" | sudo tee -a $SERVICE_PATH > /dev/null
              echo "WantedBy=multi-user.target" | sudo tee -a $SERVICE_PATH > /dev/null
              
              sudo systemctl enable $SERVICE_NAME
          fi

          echo "Reloading systemd and starting service..."
          sudo systemctl daemon-reload
          sudo systemctl start $SERVICE_NAME

          # Clean up temporary folder on the server
          rm -rf /home/opc/tmp_deploy
          echo "Deployment finished successfully!"
          
          END_SSH_SCRIPT

          # 5. Securely remove the key from the GitHub runner
          rm deploy_key
